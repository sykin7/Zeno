<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zeno</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #e2e8f0; --primary: #3b82f6; --msg-me: #2563eb; --msg-other: #334155; --success: #10b981; --danger: #ef4444; --border: #334155; --text-muted: #94a3b8; --nav-bg: #162032;}
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; -webkit-font-smoothing: antialiased; }
        .hidden { display: none !important; }
        input, button { width: 100%; box-sizing: border-box; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border); outline: none; font-size: 16px; transition: all 0.2s; }
        input { background: #0f172a; color: white; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25); }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; border: none; display: flex; justify-content: center; align-items: center; gap: 8px; }
        button:active { transform: scale(0.98); }
        button.secondary { background: #334155; }
        button.danger { background: var(--danger); }
        button.success { background: var(--success); }
        
        .container { max-width: 500px; margin: auto; padding: 20px; width: 100%; box-sizing: border-box;}
        .panel { background: var(--panel); padding: 30px 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #app-layout { display: flex; flex-direction: column; height: 100vh; height: 100dvh; width: 100vw; background: var(--bg); }
        .content-area { flex: 1; overflow-y: auto; padding: 20px; box-sizing: border-box; -webkit-overflow-scrolling: touch; }
        .nav-bar { display: flex; background: var(--nav-bg); border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom); z-index: 50; flex-shrink: 0;}
        .nav-item { flex: 1; text-align: center; padding: 15px 0; cursor: pointer; color: var(--text-muted); font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative;}
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; }
        .badge { background: var(--danger); color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; position: absolute; top: 5px; right: 20%; font-weight: bold; }

        @media (min-width: 768px) {
            #app-layout { flex-direction: row; }
            .nav-bar { flex-direction: column; width: 220px; border-top: none; border-right: 1px solid var(--border); padding-top: 20px; justify-content: flex-start; gap: 10px;}
            .nav-item { flex: none; flex-direction: row; padding: 15px 25px; font-size: 16px; justify-content: flex-start; gap: 15px;}
            .badge { top: 15px; right: 20px; }
            .content-area { max-width: 800px; margin: 0 auto; width: 100%; }
        }

        .list-item { padding: 15px; background: #334155; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; position: relative; }
        .profile-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid var(--border); padding: 30px; border-radius: 16px; text-align: center; margin-bottom: 20px;}
        .profile-uid { font-size: 32px; font-weight: bold; letter-spacing: 4px; margin: 15px 0; color: #fff; font-family: monospace; word-break: break-all;}
        
        #chat-view { display: flex; flex-direction: column; height: 100vh; height: 100dvh; background: var(--bg); position: fixed; inset: 0; z-index: 100; }
        .header-bar { padding: 15px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-top: max(15px, env(safe-area-inset-top)); flex-shrink: 0;}
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; -webkit-overflow-scrolling: touch; }
        .msg-row { display: flex; width: 100%; flex-direction: column; }
        .me { align-items: flex-end; }
        .other { align-items: flex-start; }
        .msg-bubble { max-width: 85%; padding: 10px 15px; border-radius: 12px; line-height: 1.5; word-wrap: break-word; word-break: break-word; }
        .me .msg-bubble { background: var(--msg-me); border-bottom-right-radius: 2px; }
        .other .msg-bubble { background: var(--msg-other); border-bottom-left-radius: 2px; }
        .msg-time { font-size: 10px; color: #64748b; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
        #chat-input-area { padding: 10px 15px; background: var(--panel); display: flex; gap: 8px; align-items: center; padding-bottom: max(10px, env(safe-area-inset-bottom)); flex-shrink: 0;}
        #chat-input-area input { margin: 0; flex: 1; }
        #send-btn { width: auto; padding: 0 15px; margin: 0; height: 42px;}
        
        .voice-btn { width: 42px !important; height: 42px; border-radius: 50% !important; padding: 0 !important; font-size: 18px; margin: 0; flex-shrink: 0; touch-action: none; -webkit-user-select: none; user-select: none;}
        .clip-btn { width: 42px !important; height: 42px; border-radius: 50% !important; padding: 0 !important; margin: 0; flex-shrink: 0; background: var(--secondary); display: flex; align-items: center; justify-content: center;}
        
        .recording { background: var(--danger) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .audio-player { display: flex; align-items: center; gap: 8px; cursor: pointer; min-width: 100px; }
        .unread-badge { background: var(--danger); color: white; font-size: 11px; padding: 2px 6px; border-radius: 10px; position: absolute; right: 10px; top: 10px; font-weight: bold; }
        #network-bar { background: var(--danger); color: white; text-align: center; padding: 5px; font-size: 12px; position: fixed; width:100%; z-index:1000; top:0;}
        
        #webrtc-view { position: fixed; inset: 0; background: #0f172a; z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .call-avatar { width: 100px; height: 100px; background: #1e293b; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; margin-bottom: 20px; border: 2px solid var(--primary); box-shadow: 0 0 30px rgba(59,130,246,0.3);}
        .call-name { font-size: 24px; font-weight: bold; color: white; margin-bottom: 10px; }
        .call-status-text { font-size: 14px; color: var(--text-muted); margin-bottom: 60px; }
        .call-tools { display: flex; gap: 40px; }
        .circle-btn { width: 70px; height: 70px; border-radius: 50%; font-size: 28px; display: flex; align-items: center; justify-content: center; margin: 0;}
        .tick-read { color: var(--success); font-weight: bold; }
        .flex { display: flex; gap: 10px;}
    </style>
</head>
<body>
    <div id="network-bar" class="hidden">⚠ 连接已断开，正在后台尝试重连...</div>

    <div id="uid-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div class="panel" style="width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--primary); box-shadow: 0 0 30px rgba(59,130,246,0.2);">
            <h2 style="color: var(--success); margin-top: 0;">🎉 账号创建成功</h2>
            <p style="color: var(--text-muted); font-size: 14px;">您的加密私钥已保存在本设备。<br>强烈建议立即下载备份，以免账号丢失！</p>
            <div class="profile-uid" id="new-uid-display"></div>
            <button class="success" onclick="downloadBackupAndLogin()" style="margin-bottom: 12px; height: 50px; font-size: 16px;">💾 一键下载密钥备份包 (推荐)</button>
            <button class="secondary" onclick="closeUidModal()">稍后自己备份，直接登录</button>
        </div>
    </div>

    <div id="auth-view" class="container">
        <div class="panel">
            <div class="brand-header"><span style="font-size:40px;">🛡️</span><h2>Zeno</h2><p>安全 · 私密 · 无痕</p></div>
            <input type="text" id="uid-input" placeholder="8位数字 UID" maxlength="8">
            <input type="password" id="password" placeholder="安全密码">
            <button onclick="login()">登 录</button>
            <button class="secondary" onclick="register()">创建新账号</button>
            <div class="flex" style="margin-top:20px;">
                <button class="secondary" style="font-size:13px;" onclick="exportData()">💾 导出本地数据</button>
                <button class="secondary" style="font-size:13px;" onclick="document.getElementById('import-file').click()">📂 导入恢复包</button>
                <input type="file" id="import-file" class="hidden" onchange="importData(event)">
            </div>
        </div>
    </div>

    <div id="app-layout" class="hidden">
        <div class="content-area">
            <div id="tab-msgs">
                <h2 style="margin-top:0;">会话</h2>
                <div id="msg-list"></div>
            </div>

            <div id="tab-contacts" class="hidden">
                <h2 style="margin-top:0;">联系人</h2>
                <div id="user-list"></div>
            </div>

            <div id="tab-requests" class="hidden">
                <h2 style="margin-top:0;">添加好友</h2>
                <div class="flex" style="margin-bottom: 25px;">
                    <input type="text" id="search-uid-input" placeholder="输入精准 8 位 UID 搜索" maxlength="8" style="margin:0;">
                    <button class="primary" style="width:90px; margin:0;" onclick="searchAndRequest()">搜索</button>
                </div>
                <h4 style="color:var(--text-muted); margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">收到的请求 (7天自动销毁)</h4>
                <div id="request-list"></div>
            </div>

            <div id="tab-profile" class="hidden">
                <h2 style="margin-top:0;">个人中心</h2>
                <div class="profile-card">
                    <div style="color:var(--text-muted); font-size:14px;">我的专属 UID</div>
                    <div class="profile-uid" id="profile-uid-show"></div>
                    <div style="font-size:20px; font-weight:bold; margin-bottom: 5px;" id="profile-name-show"></div>
                </div>
                <h4 style="color:var(--text-muted);">资料修改</h4>
                <input type="text" id="settings-nickname" placeholder="修改昵称">
                <button onclick="saveProfile()" style="margin-bottom: 30px;">更新资料</button>
                
                <h4 style="color:var(--text-muted);">数据安全管理</h4>
                <button class="secondary" onclick="exportData(currentUid)">💾 导出本地加密数据包</button>
                <button class="danger" onclick="logout()" style="margin-top: 15px;">🚪 退出当前账号</button>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-item active" onclick="switchTab('msgs', this)"><span class="nav-icon">💬</span><span>消息</span><span id="badge-msgs" class="badge hidden"></span></div>
            <div class="nav-item" onclick="switchTab('contacts', this)"><span class="nav-icon">👥</span><span>联系人</span></div>
            <div class="nav-item" onclick="switchTab('requests', this)"><span class="nav-icon">👋</span><span>新朋友</span><span id="badge-reqs" class="badge hidden"></span></div>
            <div class="nav-item" onclick="switchTab('profile', this)"><span class="nav-icon">⚙️</span><span>我的</span></div>
        </div>
    </div>

    <div id="chat-view" class="hidden">
        <div class="header-bar">
            <div><strong id="chat-target-name"></strong><br><span id="chat-target-status" style="font-size:11px;"></span></div>
            <div class="flex"><button class="success" style="width:40px; height:40px; border-radius:50%; padding:0; margin:0;" onclick="startCall()">📞</button><button class="danger" style="width:auto; padding:5px 10px; margin:0;" onclick="clearChat()">清空</button><button class="secondary" style="width:auto; padding:5px 15px; margin:0;" onclick="closeChat()">返回</button></div>
        </div>
        <div id="chat-box" onscroll="handleChatScroll()"></div>
        <div id="chat-input-area">
            <button class="secondary voice-btn" id="voice-btn" onmousedown="startRecording(event)" onmouseup="stopRecording(event)" onmouseleave="stopRecording(event)" ontouchstart="startRecording(event)" ontouchend="stopRecording(event)" ontouchcancel="stopRecording(event)" oncontextmenu="return false;">🎤</button>
            <button class="secondary clip-btn" onclick="document.getElementById('file-upload').click()">📎</button>
            <input type="file" id="file-upload" class="hidden" accept="*/*" onchange="handleFileUpload(event)">
            <input type="text" id="msg-input" placeholder="输入消息..." onkeypress="if(event.keyCode==13) sendMessage()">
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <div id="webrtc-view" class="hidden">
        <audio id="remote-audio" autoplay playsinline></audio>
        <div class="call-avatar">👤</div>
        <div class="call-name" id="call-target-display-name">未知联系人</div>
        <div class="call-status-text" id="call-status">正在发起语音通话...</div>
        <div class="call-tools" id="call-tools"><button class="danger circle-btn" onclick="endCall()">☎</button></div>
        <div class="call-tools hidden" id="incoming-tools"><button class="danger circle-btn" onclick="endCall()">☎</button><button class="success circle-btn" onclick="acceptCall()">📞</button></div>
    </div>

    <script>
        let db, currentUid, currentNickname, currentToken, currentTargetUid, currentTargetName, targetPublicKeyStr, socket, peerConnection, localStream;
        let onlineUsers = new Set(), unreadMap = {}, lastLoadedTs = 0, isEnd = false, mediaRecorder, audioChunks = [];
        let isRecording = false; 
        let activeCallTarget = null;
        let iceCandidateQueue = []; 
        const STUN = { iceServers: [{ urls: 'stun:stun.qq.com:3478' }, { urls: 'stun:stun.miwifi.com:3478' }, { urls: 'stun:stun.aliyun.com:3478' }] };

        const safeBuf2B64 = (buffer) => {
            const bytes = new Uint8Array(buffer); let binary = '';
            for (let i = 0; i < bytes.byteLength; i += 8192) { binary += String.fromCharCode.apply(null, bytes.subarray(i, i + 8192)); }
            return btoa(binary);
        };
        const safeB642Buf = (b64) => {
            const binary_string = atob(b64); const len = binary_string.length; const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) { bytes[i] = binary_string.charCodeAt(i); }
            return bytes.buffer;
        };

        const getMicrophoneAccess = async () => {
            if (navigator.mediaDevices === undefined) navigator.mediaDevices = {};
            if (navigator.mediaDevices.getUserMedia === undefined) {
                navigator.mediaDevices.getUserMedia = function(constraints) {
                    var getUserMedia = navigator.webkitGetUserMedia || navigator.mozGetUserMedia;
                    if (!getUserMedia) return Promise.reject(new Error('BrowserNotSupported'));
                    return new Promise((resolve, reject) => getUserMedia.call(navigator, constraints, resolve, reject));
                }
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                return stream;
            } catch (err) {
                let errorMsg = "设备连接失败！\n";
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') errorMsg += "您拒绝了麦克风权限，或应用无权限。";
                else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') errorMsg += "找不到麦克风硬件。";
                else if (err.message === 'BrowserNotSupported' || err.name === 'NotSupportedError') errorMsg += "必须在系统自带浏览器或 Chrome 的 HTTPS 安全环境下使用！请不要在微信内打开。";
                else errorMsg += err.message || err.name;
                alert(errorMsg);
                throw err;
            }
        };

        const requestNotifyPermission = () => { if ("Notification" in window && Notification.permission !== "denied") Notification.requestPermission(); };
        const showPushNotification = (fromName, text) => { if ("Notification" in window && Notification.permission === "granted" && document.hidden) new Notification(`Zeno - ${fromName}`, { body: text, icon: '🛡️' }); };

        const initDB = () => new Promise((res) => {
            const req = indexedDB.open('SecureChatDB', 8);
            req.onupgradeneeded = e => {
                const idb = e.target.result;
                if (!idb.objectStoreNames.contains('keys')) idb.createObjectStore('keys', { keyPath: 'uid' });
                if (!idb.objectStoreNames.contains('contacts')) idb.createObjectStore('contacts', { keyPath: 'uid' });
                if (!idb.objectStoreNames.contains('messages')) {
                    const os = idb.createObjectStore('messages', { keyPath: 'id', autoIncrement: true });
                    os.createIndex('contact', 'contact'); os.createIndex('ts', 'ts');
                }
            };
            req.onsuccess = e => { db = e.target.result; res(); };
        });

        const cryptoOp = {
            async gen() { return await window.crypto.subtle.generateKey({ name: "RSA-OAEP", modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: "SHA-256" }, true, ["encrypt", "decrypt"]); },
            async export(k) { return safeBuf2B64(await window.crypto.subtle.exportKey("spki", k)); },
            async enc(txt, pubStr) {
                const pub = await window.crypto.subtle.importKey("spki", safeB642Buf(pubStr), { name: "RSA-OAEP", hash: "SHA-256" }, true, ["encrypt"]);
                const aes = await window.crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt"]);
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const cipher = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv }, aes, new TextEncoder().encode(txt));
                const k = await window.crypto.subtle.encrypt({ name: "RSA-OAEP" }, pub, await window.crypto.subtle.exportKey("raw", aes));
                return JSON.stringify({ k: safeBuf2B64(k), i: safeBuf2B64(iv), c: safeBuf2B64(cipher) });
            },
            async dec(str, priv) {
                const p = JSON.parse(str);
                const rawK = await window.crypto.subtle.decrypt({ name: "RSA-OAEP" }, priv, safeB642Buf(p.k));
                const aes = await window.crypto.subtle.importKey("raw", rawK, "AES-GCM", false, ["decrypt"]);
                return new TextDecoder().decode(await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: safeB642Buf(p.i) }, aes, safeB642Buf(p.c)));
            }
        };

        const register = async () => {
            const p = document.getElementById('password').value; if(!p) return alert('请输入安全密码');
            const nick = prompt("请输入您的专属昵称："); if(!nick || nick.trim() === '') return;
            const keys = await cryptoOp.gen();
            const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nickname: nick.trim(), password: p, public_key: await cryptoOp.export(keys.publicKey) }) }).then(r=>r.json());
            if(res.error) return alert(res.error);
            const tx = db.transaction('keys', 'readwrite'); tx.objectStore('keys').put({ uid: res.uid, nick: nick.trim(), priv: keys.privateKey, pub: keys.publicKey });
            document.getElementById('uid-input').value = res.uid; document.getElementById('new-uid-display').innerText = res.uid; document.getElementById('uid-modal').classList.remove('hidden');
        };

        const downloadBackupAndLogin = async () => { const newUid = document.getElementById('new-uid-display').innerText; await exportData(newUid); closeUidModal(); };
        const closeUidModal = () => { document.getElementById('uid-modal').classList.add('hidden'); };

        const login = async () => {
            const u = document.getElementById('uid-input').value.trim(), p = document.getElementById('password').value;
            if(!u || !p) return alert('请输入 UID 和密码');
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ uid: u, password: p }) }).then(r=>r.json());
            if(res.error) return alert('验证失败');
            const keys = await new Promise(r => { const req = db.transaction('keys').objectStore('keys').get(u); req.onsuccess = () => r(req.result); });
            if(!keys) return alert("本地缺失解密私钥，如果您更换了设备，请先导入备份文件。");
            currentUid = u; currentNickname = res.nickname; currentToken = res.token;
            sessionStorage.setItem('chat_uid', u); sessionStorage.setItem('chat_token', res.token);
            document.getElementById('auth-view').classList.add('hidden'); document.getElementById('app-layout').classList.remove('hidden');
            document.getElementById('profile-uid-show').innerText = u; document.getElementById('profile-name-show').innerText = currentNickname; document.getElementById('settings-nickname').value = currentNickname;
            requestNotifyPermission(); initSocket(); renderUI();
        };

        const logout = () => { if(confirm('确定要退出当前账号吗？')) { sessionStorage.clear(); location.reload(); } };

        const exportData = async (targetUid = '') => {
            try {
                const keys = await new Promise(r=>{const rq=db.transaction('keys').objectStore('keys').getAll();rq.onsuccess=()=>r(rq.result)});
                const msgs = await new Promise(r=>{const rq=db.transaction('messages').objectStore('messages').getAll();rq.onsuccess=()=>r(rq.result)});
                const contacts = await new Promise(r=>{const rq=db.transaction('contacts').objectStore('contacts').getAll();rq.onsuccess=()=>r(rq.result)});
                if (keys.length === 0) return alert('没有任何数据！');
                const b = new Blob([JSON.stringify({keys,msgs,contacts})], {type:'application/json'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(b);
                const idStr = targetUid ? `_UID_${targetUid}` : '';
                a.download = `Zeno_Backup${idStr}_${Date.now()}.json`; a.click();
            } catch (error) { alert('导出失败'); }
        };

        const importData = (e) => { const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=async ev=>{ try{const d=JSON.parse(ev.target.result); const tx=db.transaction(['keys','messages','contacts'],'readwrite'); if(d.keys)d.keys.forEach(k=>tx.objectStore('keys').put(k)); if(d.msgs)d.msgs.forEach(m=>tx.objectStore('messages').put(m)); if(d.contacts)d.contacts.forEach(c=>tx.objectStore('contacts').put(c)); tx.oncomplete=()=>{alert('恢复成功，请登录！');location.reload();}; }catch(err){alert('格式错误！');} }; r.readAsText(f); };

        const switchTab = (tabId, element) => {
            ['msgs', 'contacts', 'requests', 'profile'].forEach(id => document.getElementById(`tab-${id}`).classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            element.classList.add('active');
            if(tabId === 'requests') { document.getElementById('badge-reqs').classList.add('hidden'); socket.emit('fetch_friend_requests', {uid: currentUid, token: currentToken}); }
        };

        const initSocket = () => {
            socket = io({ transports: ['websocket'], reconnectionAttempts: 20 });
            socket.on('connect', () => { document.getElementById('network-bar').classList.add('hidden'); socket.emit('register_socket', { uid: currentUid, token: currentToken }); socket.emit('fetch_friend_requests', {uid: currentUid, token: currentToken});});
            socket.on('disconnect', () => document.getElementById('network-bar').classList.remove('hidden'));
            socket.on('online_users', d => { d.users.forEach(u => onlineUsers.add(u)); renderUI(); });
            socket.on('user_status', d => { d.status === 'online' ? onlineUsers.add(d.uid) : onlineUsers.delete(d.uid); renderUI(); if(currentTargetUid===d.uid) updateStatusUI(); });
            socket.on('receive_message', async d => processMsg(d));
            socket.on('offline_sync', ds => ds.forEach(d => processMsg(d)));
            socket.on('msg_ack', d => updateTick(d.msgId, 1));
            socket.on('msg_read', d => updateTick(d.msgId, 2));
            socket.on('webrtc_signal', handleSignal);
            
            socket.on('new_friend_request', () => { document.getElementById('badge-reqs').innerText = '新'; document.getElementById('badge-reqs').classList.remove('hidden'); });
            socket.on('friend_requests_data', async (arr) => {
                const list = document.getElementById('request-list'); list.innerHTML = '';
                if(arr.length === 0) return list.innerHTML = '<div style="text-align:center; color:var(--text-muted); font-size:13px; margin-top:20px;">暂无好友请求</div>';
                const keys = await new Promise(r => { const req = db.transaction('keys').objectStore('keys').get(currentUid); req.onsuccess = () => r(req.result); });
                for(let r of arr) {
                    try {
                        const plain = await cryptoOp.dec(r.payload, keys.priv);
                        const senderInfo = JSON.parse(plain);
                        const div = document.createElement('div'); div.className = 'list-item';
                        div.innerHTML = `<div><span style="font-weight:bold;">${senderInfo.n}</span><br><span style="font-size:11px;color:#94a3b8;">UID: ${senderInfo.u}</span><br><span style="font-size:10px;color:#64748b;">${new Date(r.ts).toLocaleString()}</span></div>
                        <div class="flex"><button class="success" style="width:auto;padding:5px 15px;margin:0;" onclick="acceptReq('${r.id}','${senderInfo.u}','${senderInfo.n}','${senderInfo.p}')">同意</button><button class="danger" style="width:auto;padding:5px 15px;margin:0;" onclick="rejectReq('${r.id}')">忽略</button></div>`;
                        list.appendChild(div);
                    } catch(e) {}
                }
            });
        };

        const processMsg = async (d) => {
            try {
                const keys = await new Promise(r => { const req = db.transaction('keys').objectStore('keys').get(currentUid); req.onsuccess = () => r(req.result); });
                const plain = await cryptoOp.dec(d.payload, keys.priv);
                const msg = JSON.parse(plain);
                if(msg.t === 'sys_accept') {
                    const res = await fetch('/api/search_user', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ uid: d.from }) }).then(r=>r.json());
                    if(res.status === 'ok') {
                        const tx = db.transaction('contacts', 'readwrite'); tx.objectStore('contacts').put({ uid: res.uid, nick: res.nickname, pub: res.public_key });
                        showPushNotification("系统通知", `${res.nickname} 已通过你的请求`); renderUI();
                    }
                    return; 
                }
                const obj = { contact: d.from, type: 'other', content: msg.c, mType: msg.t, ts: d.timestamp, msgId: msg.id, status: 0 };
                const tx = db.transaction('messages', 'readwrite'); tx.objectStore('messages').add(obj);
                const contact = await new Promise(r => { const req = db.transaction('contacts').objectStore('contacts').get(d.from); req.onsuccess = () => r(req.result); });
                showPushNotification(contact ? contact.nick : d.from, msg.t === 'text' ? msg.c : '[媒体消息]');

                if(currentTargetUid === d.from && !document.getElementById('chat-view').classList.contains('hidden')) { appendDOM(obj); boxScroll(); socket.emit('msg_read', { from: currentUid, token: currentToken, to: d.from, msgId: msg.id }); }
                else { unreadMap[d.from] = (unreadMap[d.from] || 0) + 1; renderUI(); socket.emit('msg_ack', { from: currentUid, token: currentToken, to: d.from, msgId: msg.id }); }
            } catch(e) {}
        };

        const renderUI = async () => {
            const listC = document.getElementById('user-list'); listC.innerHTML = '';
            const listM = document.getElementById('msg-list'); listM.innerHTML = '';
            const contacts = await new Promise(r => { const req = db.transaction('contacts').objectStore('contacts').getAll(); req.onsuccess = () => r(req.result); });
            let totalUnread = 0;
            if(contacts.length === 0) { listC.innerHTML = listM.innerHTML = '<div style="text-align:center; color:var(--text-muted); font-size:13px; margin-top:20px;">暂无会话</div>'; }
            contacts.forEach(c => {
                const isOnline = onlineUsers.has(c.uid); const unread = unreadMap[c.uid] || 0; totalUnread += unread;
                const html = `<div><span style="font-weight:bold;">${c.nick}</span> <span style="font-size:11px;color:#94a3b8;">(${c.uid})</span><br><span style="font-size:11px;color:${isOnline?'var(--success)':'var(--danger)'}">${isOnline?'● 在线':'● 离线'}</span></div>${unread?`<div class="badge" style="position:static;">${unread > 99 ? '99+' : unread}</div>`:''}<div class="flex"><button class="secondary" style="width:auto;padding:5px 15px;margin:0;" onclick="openChat('${c.uid}','${c.nick}','${c.pub}')">聊天</button></div>`;
                const divC = document.createElement('div'); divC.className = 'list-item'; divC.innerHTML = html; listC.appendChild(divC);
                const divM = document.createElement('div'); divM.className = 'list-item'; divM.innerHTML = html; listM.appendChild(divM);
            });
            const bMsgs = document.getElementById('badge-msgs');
            if(totalUnread > 0) { bMsgs.innerText = totalUnread > 99 ? '99+' : totalUnread; bMsgs.classList.remove('hidden'); } else { bMsgs.classList.add('hidden'); }
        };

        const searchAndRequest = async () => {
            const u = document.getElementById('search-uid-input').value.trim(); if(!u || u === currentUid) return;
            const res = await fetch('/api/search_user', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ uid: u }) }).then(r=>r.json());
            if(res.error) return alert(res.error);
            const myKeys = await new Promise(r => { const req = db.transaction('keys').objectStore('keys').get(currentUid); req.onsuccess = () => r(req.result); });
            const payload = { u: currentUid, n: currentNickname, p: await cryptoOp.export(myKeys.pub) };
            const enc = await cryptoOp.enc(JSON.stringify(payload), res.public_key);
            socket.emit('send_friend_request', { from: currentUid, token: currentToken, to: res.uid, payload: enc });
            alert(`已发送加密请求给 ${res.nickname}`); document.getElementById('search-uid-input').value = '';
        };

        const rejectReq = (reqId) => { socket.emit('resolve_friend_request', { uid: currentUid, token: currentToken, req_id: reqId }); socket.emit('fetch_friend_requests', {uid: currentUid, token: currentToken}); };
        
        const acceptReq = async (reqId, fromUid, fromNick, fromPub) => {
            const tx = db.transaction('contacts', 'readwrite'); tx.objectStore('contacts').put({ uid: fromUid, nick: fromNick, pub: fromPub });
            socket.emit('resolve_friend_request', { uid: currentUid, token: currentToken, req_id: reqId });
            const payload = { id: Math.random().toString(36).substr(2, 9), t: 'sys_accept', c: 'ok' };
            const enc = await cryptoOp.enc(JSON.stringify(payload), fromPub);
            socket.emit('send_message', { from: currentUid, token: currentToken, to: fromUid, payload: enc });
            alert('已添加对方为好友'); socket.emit('fetch_friend_requests', {uid: currentUid, token: currentToken}); renderUI();
        };

        const loadMore = async (uid) => {
            const tx = db.transaction('messages').objectStore('messages');
            const idx = tx.index('contact'); const range = IDBKeyRange.only(uid);
            let count = 0, msgs = [];
            return new Promise(res => {
                idx.openCursor(range, 'prev').onsuccess = e => {
                    const cursor = e.target.result;
                    if(cursor && count < 50) { if(!lastLoadedTs || cursor.value.ts < lastLoadedTs) { msgs.push(cursor.value); count++; } cursor.continue(); }
                    else { if(msgs.length > 0) lastLoadedTs = msgs[msgs.length-1].ts; if(count < 50) isEnd = true; res(msgs.reverse()); }
                };
            });
        };

        const handleChatScroll = async () => {
            const box = document.getElementById('chat-box');
            if(box.scrollTop === 0 && !isEnd) { const oldHeight = box.scrollHeight; const prev = await loadMore(currentTargetUid); prev.reverse().forEach(m => prependDOM(m)); box.scrollTop = box.scrollHeight - oldHeight; }
        };

        const openChat = async (uid, name, pub) => {
            currentTargetUid = uid; currentTargetName = name; targetPublicKeyStr = pub;
            unreadMap[uid] = 0; lastLoadedTs = 0; isEnd = false;
            document.getElementById('app-layout').classList.add('hidden'); document.getElementById('chat-view').classList.remove('hidden');
            document.getElementById('chat-target-name').innerText = name; updateStatusUI(); document.getElementById('chat-box').innerHTML = '';
            const msgs = await loadMore(uid); msgs.forEach(m => appendDOM(m)); boxScroll();
            msgs.forEach(m => { if(m.type === 'other') socket.emit('msg_read', { from: currentUid, token: currentToken, to: uid, msgId: m.msgId }); });
            renderUI();
        };

        const closeChat = () => { currentTargetUid = null; document.getElementById('chat-view').classList.add('hidden'); document.getElementById('app-layout').classList.remove('hidden'); };
        
        const appendDOM = (m) => {
            const box = document.getElementById('chat-box'); const row = document.createElement('div'); row.className = `msg-row ${m.type}`;
            let html = '';
            if(m.mType === 'text') html = m.content.replace(/[&<>'"]/g, t=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t]));
            else if(m.mType === 'image') html = `<img src="${m.content}" style="max-width:100%; border-radius:8px;">`;
            else if(m.mType === 'audio') html = `<div class="audio-player" onclick="new Audio('${m.content}').play()">🎵 语音 (点击播放)</div>`;
            else html = `<a href="${m.content}" download style="color:#fff; text-decoration:underline;">📁 下载附件</a>`;
            let tick = m.type === 'me' ? `<span id="tick-${m.msgId}" style="margin-left:5px;" class="${m.status===2?'tick-read':''}">${m.status === 2 ? '✓✓' : (m.status === 1 ? '✓✓' : '✓')}</span>` : '';
            row.innerHTML = `<div class="msg-bubble">${html}</div><div class="msg-time">${new Date(m.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}${tick}</div>`;
            box.appendChild(row);
        };
        const prependDOM = (m) => {
            const box = document.getElementById('chat-box'); const row = document.createElement('div'); row.className = `msg-row ${m.type}`;
            let html = '';
            if(m.mType === 'text') html = m.content.replace(/[&<>'"]/g, t=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t]));
            else if(m.mType === 'image') html = `<img src="${m.content}" style="max-width:100%; border-radius:8px;">`;
            else if(m.mType === 'audio') html = `<div class="audio-player" onclick="new Audio('${m.content}').play()">🎵 语音 (点击播放)</div>`;
            else html = `<a href="${m.content}" download style="color:#fff; text-decoration:underline;">📁 下载附件</a>`;
            let tick = m.type === 'me' ? `<span id="tick-${m.msgId}" style="margin-left:5px;" class="${m.status===2?'tick-read':''}">${m.status === 2 ? '✓✓' : (m.status === 1 ? '✓✓' : '✓')}</span>` : '';
            row.innerHTML = `<div class="msg-bubble">${html}</div><div class="msg-time">${new Date(m.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}${tick}</div>`;
            box.insertBefore(row, box.firstChild);
        };

        const sendMessage = async (mType = 'text', content = null) => {
            const input = document.getElementById('msg-input'); const val = content || input.value.trim(); if(!val) return;
            if(!content) input.value = ''; const msgId = Math.random().toString(36).substr(2, 9); const ts = Date.now();
            const payload = { id: msgId, t: mType, c: val }; const obj = { contact: currentTargetUid, type: 'me', content: val, mType, ts, msgId, status: 0 };
            const tx = db.transaction('messages', 'readwrite'); tx.objectStore('messages').add(obj); appendDOM(obj); boxScroll();
            const enc = await cryptoOp.enc(JSON.stringify(payload), targetPublicKeyStr);
            socket.emit('send_message', { from: currentUid, token: currentToken, to: currentTargetUid, payload: enc });
        };
        
        const handleFileUpload = (event) => { 
            const file = event.target.files[0]; if (!file) return; 
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); let w = img.width, h = img.height; const maxW = 1200;
                        if(w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
                        sendMessage('image', canvas.toDataURL('image/jpeg', 0.6));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            } else {
                if (file.size > 2 * 1024 * 1024) return alert('为了防止内存崩溃，非图片文件限制最大 2MB'); 
                const reader = new FileReader(); reader.onload = async (e) => { await sendMessage('file', e.target.result); }; reader.readAsDataURL(file); 
            }
            document.getElementById('file-upload').value = ''; 
        };
        
        const startRecording = async (e) => { 
            if(e && e.type === 'touchstart') e.preventDefault();
            if(isRecording) return; 
            isRecording = true;
            document.getElementById('voice-btn').classList.add('recording');
            try { 
                const s = await getMicrophoneAccess(); 
                if (!isRecording) { s.getTracks().forEach(t => t.stop()); return; }
                mediaRecorder = new MediaRecorder(s); audioChunks = []; 
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data); 
                mediaRecorder.onstop = () => { const b = new Blob(audioChunks, { type: 'audio/webm' }); const r = new FileReader(); r.readAsDataURL(b); r.onloadend = () => sendMessage('audio', r.result); }; 
                mediaRecorder.start(); 
            } catch(err) { 
                isRecording = false;
                document.getElementById('voice-btn').classList.remove('recording');
            } 
        };
        const stopRecording = (e) => { 
            if(e && (e.type === 'touchend' || e.type === 'touchcancel')) e.preventDefault();
            if(!isRecording) return; 
            isRecording = false; 
            document.getElementById('voice-btn').classList.remove('recording'); 
            if(mediaRecorder && mediaRecorder.state !== 'inactive') { 
                mediaRecorder.stop(); 
                if(mediaRecorder.stream) mediaRecorder.stream.getTracks().forEach(t => t.stop());
            } 
        };
        
        const updateStatusUI = () => document.getElementById('chat-target-status').innerText = onlineUsers.has(currentTargetUid)?"在线":"离线";
        const updateTick = (id, s) => { const e = document.getElementById(`tick-${id}`); if(e) { e.innerText = '✓✓'; if(s===2) e.className = 'tick-read'; } };
        const boxScroll = () => { const b = document.getElementById('chat-box'); b.scrollTop = b.scrollHeight; };
        const clearChat = () => { if(confirm("清空该对话记录？不可逆！")) { const tx = db.transaction('messages', 'readwrite'); tx.objectStore('messages').index('contact').openKeyCursor(IDBKeyRange.only(currentTargetUid)).onsuccess = e => { const c = e.target.result; if(c){ tx.objectStore('messages').delete(c.primaryKey); c.continue(); } else { document.getElementById('chat-box').innerHTML = ''; } }; } };

        const startCall = async () => {
            try {
                localStream = await getMicrophoneAccess(); 
                document.getElementById('webrtc-view').classList.remove('hidden'); 
                document.getElementById('call-status').innerText = "正在等待对方接听...";
                document.getElementById('call-target-display-name').innerText = currentTargetName;

                peerConnection = new RTCPeerConnection(STUN);
                iceCandidateQueue = []; 
                
                localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
                peerConnection.onicecandidate = e => e.candidate && socket.emit('webrtc_signal', { from: currentUid, token: currentToken, to: currentTargetUid, type: 'ice', ice: e.candidate });
                peerConnection.ontrack = e => document.getElementById('remote-audio').srcObject = e.streams[0];
                
                const offer = await peerConnection.createOffer(); 
                await peerConnection.setLocalDescription(offer);
                socket.emit('webrtc_signal', { from: currentUid, token: currentToken, to: currentTargetUid, type: 'offer', sdp: offer });
            } catch(e) { console.log(e); }
        };
        
        const handleSignal = async (d) => {
            try {
                if(d.type === 'offer') {
                    if(!document.getElementById('webrtc-view').classList.contains('hidden')) return socket.emit('webrtc_signal', { from: currentUid, token: currentToken, to: d.from, type: 'busy' });
                    
                    const contact = await new Promise(r => { const req = db.transaction('contacts').objectStore('contacts').get(d.from); req.onsuccess = () => r(req.result); });
                    document.getElementById('call-target-display-name').innerText = contact ? contact.nick : d.from;
                    document.getElementById('webrtc-view').classList.remove('hidden'); document.getElementById('call-tools').classList.add('hidden'); document.getElementById('incoming-tools').classList.remove('hidden'); document.getElementById('call-status').innerText = "邀请您进行语音通话...";
                    
                    peerConnection = new RTCPeerConnection(STUN);
                    iceCandidateQueue = [];
                    peerConnection.onicecandidate = e => e.candidate && socket.emit('webrtc_signal', { from: currentUid, token: currentToken, to: d.from, type: 'ice', ice: e.candidate });
                    peerConnection.ontrack = e => document.getElementById('remote-audio').srcObject = e.streams[0];
                    
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(d.sdp)); 
                    activeCallTarget = d.from;
                    while(iceCandidateQueue.length > 0) { await peerConnection.addIceCandidate(iceCandidateQueue.shift()).catch(e=>{}); }
                } else if(d.type === 'answer') { 
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(d.sdp)); 
                    document.getElementById('call-status').innerText = "通话中"; 
                    while(iceCandidateQueue.length > 0) { await peerConnection.addIceCandidate(iceCandidateQueue.shift()).catch(e=>{}); }
                } else if(d.type === 'ice') { 
                    if (peerConnection && peerConnection.remoteDescription) {
                        peerConnection.addIceCandidate(new RTCIceCandidate(d.ice)).catch(e=>{});
                    } else {
                        iceCandidateQueue.push(new RTCIceCandidate(d.ice)); 
                    }
                } else if(d.type === 'busy') { 
                    alert("对方正忙..."); endCallLocal(); 
                } else if(d.type === 'reject') { 
                    alert("对方无法接听，或已拒绝"); endCallLocal(); 
                } else if(d.type === 'end') { 
                    endCallLocal(); 
                }
            } catch(e) { console.log(e); }
        };
        
        const acceptCall = async () => {
            try {
                localStream = await getMicrophoneAccess(); 
                localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
                const ans = await peerConnection.createAnswer(); await peerConnection.setLocalDescription(ans); socket.emit('webrtc_signal', { from: currentUid, token: currentToken, to: activeCallTarget, type: 'answer', sdp: ans });
                document.getElementById('incoming-tools').classList.add('hidden'); document.getElementById('call-tools').classList.remove('hidden'); document.getElementById('call-status').innerText = "通话中";
            } catch(e) { 
                socket.emit('webrtc_signal', { from: currentUid, token: currentToken, to: activeCallTarget, type: 'reject' });
                endCallLocal(); 
            }
        };
        
        const endCall = () => { socket.emit('webrtc_signal', { from: currentUid, token: currentToken, to: currentTargetUid || activeCallTarget, type: document.getElementById('incoming-tools').classList.contains('hidden') ? 'end' : 'reject' }); endCallLocal(); };
        const endCallLocal = () => { if(localStream) localStream.getTracks().forEach(t=>t.stop()); if(peerConnection) peerConnection.close(); document.getElementById('webrtc-view').classList.add('hidden'); activeCallTarget = null; document.getElementById('remote-audio').srcObject = null; };

        const saveProfile = async () => { const n = document.getElementById('settings-nickname').value.trim(); if(!n) return; await fetch('/api/profile/update', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({uid:currentUid, token:currentToken, nickname:n})}); currentNickname=n; document.getElementById('profile-name-show').innerText=n; sessionStorage.setItem('chat_nick',n); alert('保存成功'); };

        window.onload = async () => { await initDB(); const u = sessionStorage.getItem('chat_uid'); if(u) { document.getElementById('uid-input').value = u; } };
    </script>
</body>
</html>
