<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>隐语</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #e2e8f0; --primary: #3b82f6; --msg-me: #2563eb; --msg-other: #334155; --success: #10b981; --danger: #ef4444; --warning: #f59e0b;}
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        input, button { width: 100%; box-sizing: border-box; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #475569; outline: none; font-size: 16px; }
        input { background: #334155; color: white; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        button:active { opacity: 0.8; transform: scale(0.98); }
        button.secondary { background: #334155; }
        button.danger { background: var(--danger); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        input:disabled { background: #1e293b; color: #94a3b8; }
        .container { max-width: 500px; margin: auto; padding: 20px; width: 100%; }
        .panel { background: var(--panel); padding: 20px; border-radius: 12px; }
        .flex { display: flex; gap: 10px; }
        .list-item { padding: 15px; background: #334155; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; position: relative; }
        #chat-view { display: flex; flex-direction: column; height: 100%; background: var(--bg); position: fixed; inset: 0; z-index: 10; }
        #chat-header { padding: 15px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; width: 100%; flex-direction: column; }
        .me { align-items: flex-end; }
        .other { align-items: flex-start; }
        .msg-bubble { max-width: 70%; padding: 10px 15px; border-radius: 12px; line-height: 1.5; word-wrap: break-word; }
        .me .msg-bubble { background: var(--msg-me); border-bottom-right-radius: 2px; }
        .other .msg-bubble { background: var(--msg-other); border-bottom-left-radius: 2px; }
        .msg-time { font-size: 10px; color: #64748b; margin-top: 4px; }
        .sys-msg { text-align: center; color: #94a3b8; font-size: 12px; width: 100%; }
        #chat-input-area { padding: 15px; background: var(--panel); display: flex; gap: 10px; }
        #chat-input-area input { margin: 0; }
        #chat-input-area button { width: 80px; margin: 0; }
        .status-badge { font-size: 14px; font-weight: bold; margin-left: 8px; }
        .fingerprint { font-size: 11px; color: #64748b; font-family: monospace; display: block; margin-top: 4px; }
        .unread-badge { background: var(--danger); color: white; font-size: 12px; padding: 2px 6px; border-radius: 10px; position: absolute; right: 15px; top: 15px; font-weight: bold; }
        #network-bar { background: var(--danger); color: white; text-align: center; font-size: 12px; padding: 5px; position: fixed; top: 0; width: 100%; z-index: 100; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="network-bar" class="hidden">⚠ 网络连接已断开，正在尝试重新连接...</div>

    <div id="auth-view" class="container">
        <div class="panel">
            <h2 style="text-align: center; margin-top: 0;">隐语</h2>
            <div style="font-size: 12px; color: #94a3b8; margin-bottom: 10px; text-align: center;">注册仅需填写密码，系统将分配唯一身份 ID</div>
            <input type="text" id="uid-input" placeholder="8位 UID 账号 (仅登录填写)" autocomplete="off" maxlength="8" onkeypress="if(event.keyCode==13) document.getElementById('password').focus()">
            <input type="password" id="password" placeholder="密码" maxlength="50" onkeypress="if(event.keyCode==13) login()">
            <button onclick="login()">登录</button>
            <button class="secondary" onclick="register()">注册新节点</button>
            <div style="margin-top: 15px; border-top: 1px solid #475569; padding-top: 15px;">
                <button class="secondary" onclick="exportData()">💾 备份本地数据</button>
                <input type="file" id="import-file" style="display:none" onchange="importData(event)">
                <button class="secondary" onclick="document.getElementById('import-file').click()">📂 恢复本地数据</button>
            </div>
        </div>
    </div>

    <div id="main-view" class="container hidden">
        <div class="panel">
            <div class="flex" style="justify-content: space-between; align-items: center;">
                <h3 style="margin: 0;">联系人</h3>
                <div style="text-align: right;">
                    <span id="my-name" style="color: white; font-weight: bold; display: block;"></span>
                    <span id="my-uid" style="color: #94a3b8; font-size: 12px;"></span>
                </div>
            </div>
            <div class="flex" style="margin-bottom: 15px; margin-top: 15px;">
                <input type="text" id="add-contact-input" placeholder="输入精准 8位 UID 添加" style="margin:0;" maxlength="8">
                <button class="success" style="width:100px; margin:0; background:var(--success)" onclick="addContact()">➕ 添加</button>
            </div>
            <div id="user-list" style="max-height: 400px; overflow-y: auto; padding-right: 5px;"></div>
        </div>
    </div>

    <div id="chat-view" class="hidden">
        <div id="chat-header">
            <div>
                <strong id="chat-target-name"></strong>
                <span id="chat-target-status" class="status-badge"></span>
                <span id="chat-target-uid" class="fingerprint"></span>
            </div>
            <div class="flex">
                <button class="danger" style="width: auto; padding: 5px 10px; margin: 0; font-size: 12px;" onclick="clearChat()">清空记录</button>
                <button class="secondary" style="width: auto; padding: 5px 15px; margin: 0;" onclick="closeChat()">返回</button>
            </div>
        </div>
        <div id="chat-box"></div>
        <div id="chat-input-area">
            <input type="text" id="msg-input" placeholder="输入消息..." maxlength="5000" onkeypress="if(event.keyCode==13) sendMessage()">
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        let db;
        let currentUid = null;
        let currentNickname = null;
        let currentToken = null;
        
        let currentTargetUid = null;
        let currentTargetName = null;
        let targetPublicKeyStr = null;
        
        let socket = null;
        let onlineStatusMap = {};
        let unreadCountMap = {};

        const initDB = () => {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open('SecureChatDB', 3); 
                req.onupgradeneeded = e => {
                    const idb = e.target.result;
                    if (!idb.objectStoreNames.contains('keys')) idb.createObjectStore('keys', { keyPath: 'uid' });
                    if (!idb.objectStoreNames.contains('messages')) {
                        const msgStore = idb.createObjectStore('messages', { keyPath: 'id', autoIncrement: true });
                        msgStore.createIndex('contact', 'contact', { unique: false });
                    }
                    if (!idb.objectStoreNames.contains('contacts')) {
                        idb.createObjectStore('contacts', { keyPath: 'uid' });
                    }
                };
                req.onsuccess = e => { db = e.target.result; resolve(); };
                req.onerror = () => reject();
            });
        };

        const generateKeys = async () => {
            const keyPair = await window.crypto.subtle.generateKey(
                { name: "RSA-OAEP", modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: "SHA-256" },
                true, ["encrypt", "decrypt"]
            );
            const pubKeyBuf = await window.crypto.subtle.exportKey("spki", keyPair.publicKey);
            const pubKeyStr = btoa(String.fromCharCode(...new Uint8Array(pubKeyBuf)));
            return { keyPair, pubKeyStr };
        };

        const getFingerprint = async (pubKeyStr) => {
            const binaryDer = Uint8Array.from(atob(pubKeyStr), c => c.charCodeAt(0));
            const hashBuffer = await window.crypto.subtle.digest('SHA-256', binaryDer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex.substring(0, 8).toUpperCase();
        };

        const storeKeys = (uid, nickname, keyPair) => {
            return new Promise((resolve) => {
                const tx = db.transaction('keys', 'readwrite');
                tx.objectStore('keys').put({ uid, nickname, privateKey: keyPair.privateKey, publicKey: keyPair.publicKey });
                tx.oncomplete = resolve;
            });
        };

        const getPrivateKey = (uid) => {
            return new Promise((resolve) => {
                const tx = db.transaction('keys', 'readonly');
                const req = tx.objectStore('keys').get(uid);
                req.onsuccess = () => resolve(req.result ? req.result.privateKey : null);
            });
        };

        const storeMessage = (contactUid, type, text, ts) => {
            return new Promise((resolve) => {
                const tx = db.transaction('messages', 'readwrite');
                tx.objectStore('messages').add({ contact: contactUid, type, text, timestamp: ts || Date.now() });
                tx.oncomplete = resolve;
            });
        };

        const loadMessages = (contactUid) => {
            return new Promise((resolve) => {
                const tx = db.transaction('messages', 'readonly');
                const index = tx.objectStore('messages').index('contact');
                const req = index.getAll(contactUid);
                req.onsuccess = () => resolve(req.result);
            });
        };

        const getLocalContacts = () => {
            return new Promise((resolve) => {
                const tx = db.transaction('contacts', 'readonly');
                const req = tx.objectStore('contacts').getAll();
                req.onsuccess = () => resolve(req.result);
            });
        };

        const saveLocalContact = (uid, nickname, publicKey) => {
            return new Promise((resolve) => {
                const tx = db.transaction('contacts', 'readwrite');
                tx.objectStore('contacts').put({ uid, nickname, publicKey });
                tx.oncomplete = resolve;
            });
        };

        const removeLocalContact = (uid) => {
            return new Promise((resolve) => {
                const tx = db.transaction('contacts', 'readwrite');
                tx.objectStore('contacts').delete(uid);
                tx.oncomplete = resolve;
            });
        }

        const encryptText = async (text, pubKeyStr) => {
            const binaryDer = Uint8Array.from(atob(pubKeyStr), c => c.charCodeAt(0));
            const rsaPubKey = await window.crypto.subtle.importKey(
                "spki", binaryDer.buffer, { name: "RSA-OAEP", hash: "SHA-256" }, true, ["encrypt"]
            );
            
            const aesKey = await window.crypto.subtle.generateKey(
                { name: "AES-GCM", length: 256 }, true, ["encrypt"]
            );
            
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const encoded = new TextEncoder().encode(text);
            const cipherText = await window.crypto.subtle.encrypt(
                { name: "AES-GCM", iv: iv }, aesKey, encoded
            );
            
            const rawAesKey = await window.crypto.subtle.exportKey("raw", aesKey);
            const encryptedAesKey = await window.crypto.subtle.encrypt(
                { name: "RSA-OAEP" }, rsaPubKey, rawAesKey
            );
            
            const pack = {
                k: btoa(String.fromCharCode(...new Uint8Array(encryptedAesKey))),
                i: btoa(String.fromCharCode(...new Uint8Array(iv))),
                c: btoa(String.fromCharCode(...new Uint8Array(cipherText)))
            };
            return JSON.stringify(pack);
        };

        const decryptText = async (payloadStr, privKey) => {
            const pack = JSON.parse(payloadStr);
            const encryptedAesKey = Uint8Array.from(atob(pack.k), c => c.charCodeAt(0));
            const iv = Uint8Array.from(atob(pack.i), c => c.charCodeAt(0));
            const cipherText = Uint8Array.from(atob(pack.c), c => c.charCodeAt(0));
            
            const rawAesKey = await window.crypto.subtle.decrypt(
                { name: "RSA-OAEP" }, privKey, encryptedAesKey.buffer
            );
            
            const aesKey = await window.crypto.subtle.importKey(
                "raw", rawAesKey, { name: "AES-GCM" }, false, ["decrypt"]
            );
            
            const decrypted = await window.crypto.subtle.decrypt(
                { name: "AES-GCM", iv: iv }, aesKey, cipherText.buffer
            );
            return new TextDecoder().decode(decrypted);
        };

        const apiCall = async (endpoint, payload) => {
            const res = await fetch(endpoint, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });
            return res.json();
        };

        const register = async () => {
            const p = document.getElementById('password').value;
            if(!p) return alert('请输入密码后点击注册');
            
            const nick = prompt("请设置您的专属昵称（例如：张三）：");
            if(!nick || nick.trim() === '') return alert('昵称不能为空');
            
            const keys = await generateKeys();
            const res = await apiCall('/api/register', { nickname: nick.trim(), password: p, public_key: keys.pubKeyStr });
            if (res.error) return alert(res.error);
            
            await storeKeys(res.uid, nick.trim(), keys.keyPair);
            document.getElementById('uid-input').value = res.uid;
            alert(`🎉 注册成功！\n\n您的专属 UID 是：${res.uid}\n\n⚠️ 请务必截图或牢记此 8 位数字，它是您登录和添加好友的唯一凭证！`);
        };

        const login = async () => {
            const u = document.getElementById('uid-input').value.trim();
            const p = document.getElementById('password').value;
            if(!u || !p) return alert('请输入 UID 和密码');
            
            const res = await apiCall('/api/login', { uid: u, password: p });
            if (res.error) return alert(res.error);
            
            const priv = await getPrivateKey(u);
            if (!priv) return alert('本地未找到私钥，如果是新设备请先恢复数据');
            
            currentUid = u;
            currentNickname = res.nickname;
            currentToken = res.token;
            
            sessionStorage.setItem('chat_uid', currentUid);
            sessionStorage.setItem('chat_nick', currentNickname);
            sessionStorage.setItem('chat_token', currentToken);

            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            document.getElementById('my-name').innerText = currentNickname;
            document.getElementById('my-uid').innerText = `UID: ${currentUid}`;
            initSocket();
            renderUserList();
        };

        const addContact = async () => {
            const u = document.getElementById('add-contact-input').value.trim();
            if (!u || u === currentUid) return;
            document.getElementById('add-contact-input').value = '';
            
            const res = await apiCall('/api/contact', { uid: u });
            if (res.error) return alert(res.error);
            
            await saveLocalContact(res.uid, res.nickname, res.public_key);
            alert(`已成功添加好友: ${res.nickname} (UID: ${res.uid})`);
            renderUserList();
        };

        const deleteContact = async (uid, name) => {
            if (!confirm(`确定要从列表中移除好友 ${name} 吗？`)) return;
            await removeLocalContact(uid);
            renderUserList();
        };

        const renderUserList = async () => {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            const contacts = await getLocalContacts();
            
            if (contacts.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#64748b; padding:20px;">暂无联系人，请在上方精准搜索 UID 添加</div>';
                return;
            }

            for (const contact of contacts) {
                const isOnline = onlineStatusMap[contact.uid] === true;
                const fingerprint = await getFingerprint(contact.publicKey);
                const unread = unreadCountMap[contact.uid] || 0;
                
                const div = document.createElement('div');
                div.className = 'list-item';
                const statusColor = isOnline ? 'var(--success)' : 'var(--danger)';
                const statusText = isOnline ? '[在线]' : '[离线]';
                
                let unreadHtml = '';
                if (unread > 0) {
                    unreadHtml = `<div class="unread-badge">${unread > 99 ? '99+' : unread}</div>`;
                }
                
                div.innerHTML = `
                    <div style="flex:1;">
                        <span style="font-weight:bold; color:white;">${contact.nickname}</span>
                        <span style="font-size:12px; color:#94a3b8; margin-left:5px;">(UID: ${contact.uid})</span>
                        <span class="status-badge" style="color:${statusColor}">${statusText}</span>
                        <span class="fingerprint">指纹: ${fingerprint}</span>
                    </div>
                    ${unreadHtml}
                    <div class="flex" style="flex-direction: column; gap: 5px;">
                        <button class="secondary" style="width:auto; padding:5px 15px; margin:0; font-size:12px;" onclick="openChat('${contact.uid}', '${contact.nickname}', '${contact.publicKey}', '${fingerprint}')">发消息</button>
                        <button class="danger" style="width:auto; padding:5px 15px; margin:0; font-size:12px;" onclick="deleteContact('${contact.uid}', '${contact.nickname}')">移除</button>
                    </div>
                `;
                list.appendChild(div);
            }
        };

        const updateChatInputState = (isOnline) => {
            const statusEl = document.getElementById('chat-target-status');
            if (isOnline) {
                statusEl.innerText = "[在线]";
                statusEl.style.color = "var(--success)";
            } else {
                statusEl.innerText = "[离线]";
                statusEl.style.color = "var(--danger)";
            }
        };

        const initSocket = () => {
            socket = io();
            
            socket.on('connect', () => {
                document.getElementById('network-bar').classList.add('hidden');
                socket.emit('register_socket', { uid: currentUid, token: currentToken });
            });

            socket.on('disconnect', () => {
                document.getElementById('network-bar').classList.remove('hidden');
            });
            
            socket.on('auth_failed', (data) => {
                sessionStorage.removeItem('chat_uid');
                sessionStorage.removeItem('chat_nick');
                sessionStorage.removeItem('chat_token');
                alert(data.error);
                location.reload();
            });

            socket.on('online_users', (data) => {
                data.users.forEach(u => onlineStatusMap[u] = true);
                renderUserList();
            });

            socket.on('user_status', (data) => {
                onlineStatusMap[data.uid] = (data.status === 'online');
                renderUserList();
                if (currentTargetUid === data.uid) {
                    updateChatInputState(data.status === 'online');
                }
            });

            socket.on('receive_message', async (data) => {
                try {
                    const privKey = await getPrivateKey(currentUid);
                    const plain = await decryptText(data.payload, privKey);
                    await storeMessage(data.from, 'other', plain, data.timestamp);
                    
                    if (currentTargetUid === data.from) {
                        appendMessage('other', plain, data.timestamp);
                    } else {
                        unreadCountMap[data.from] = (unreadCountMap[data.from] || 0) + 1;
                        renderUserList();
                    }
                } catch(e) {}
            });
            
            socket.on('offline_sync', async (messages) => {
                if(!messages || messages.length === 0) return;
                const privKey = await getPrivateKey(currentUid);
                let needRender = false;
                for (const msg of messages) {
                    try {
                        const plain = await decryptText(msg.payload, privKey);
                        await storeMessage(msg.from, 'other', plain, msg.timestamp);
                        if (currentTargetUid === msg.from) {
                            appendMessage('other', plain, msg.timestamp);
                        } else {
                            unreadCountMap[msg.from] = (unreadCountMap[msg.from] || 0) + 1;
                            needRender = true;
                        }
                    } catch(e) {}
                }
                if (needRender) renderUserList();
            });
            
            socket.on('message_error', (data) => {
                if (currentTargetUid === data.to) appendMessage('sys', data.msg || '发生错误，消息拦截或丢失');
            });
        };

        const openChat = async (targetUid, targetName, targetPubKey, fingerprint) => {
            currentTargetUid = targetUid;
            currentTargetName = targetName;
            targetPublicKeyStr = targetPubKey;
            
            unreadCountMap[targetUid] = 0;
            renderUserList();
            
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('chat-view').classList.remove('hidden');
            document.getElementById('chat-target-name').innerText = targetName;
            document.getElementById('chat-target-uid').innerText = `UID: ${targetUid} | 指纹: ${fingerprint}`;
            
            updateChatInputState(onlineStatusMap[targetUid] === true);
            
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            const history = await loadMessages(targetUid);
            history.forEach(msg => appendMessage(msg.type, msg.text, msg.timestamp));
        };

        const closeChat = () => {
            currentTargetUid = null; currentTargetName = null; targetPublicKeyStr = null;
            document.getElementById('chat-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            renderUserList();
        };

        const clearChat = () => {
            if (!confirm(`确定要彻底清空与 ${currentTargetName} 的所有本地聊天记录吗？此操作不可逆！`)) return;
            const tx = db.transaction('messages', 'readwrite');
            const index = tx.objectStore('messages').index('contact');
            const req = index.openCursor(IDBKeyRange.only(currentTargetUid));
            req.onsuccess = e => {
                const cursor = e.target.result;
                if (cursor) {
                    cursor.delete();
                    cursor.continue();
                } else {
                    document.getElementById('chat-box').innerHTML = '<div class="sys-msg">记录已清空</div>';
                }
            };
        };

        const escapeHTML = str => str.replace(/[&<>'"]/g, tag => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
        }[tag] || tag));

        const formatTime = (ts) => {
            const d = new Date(ts);
            return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        };

        const sendMessage = async () => {
            const input = document.getElementById('msg-input');
            const btn = document.getElementById('send-btn');
            if (input.disabled || btn.disabled) return;
            
            const text = input.value.trim();
            if(!text || !currentTargetUid) return;
            input.value = '';
            
            const ts = Date.now();
            appendMessage('me', text, ts);
            await storeMessage(currentTargetUid, 'me', text, ts);
            
            const cipher = await encryptText(text, targetPublicKeyStr);
            socket.emit('send_message', { from: currentUid, token: currentToken, to: currentTargetUid, payload: cipher });
        };

        const appendMessage = (type, text, ts) => {
            const box = document.getElementById('chat-box');
            if (type === 'sys') {
                box.innerHTML += `<div class="sys-msg">${text}</div>`;
            } else {
                const safe = escapeHTML(text);
                const timeStr = ts ? formatTime(ts) : '';
                box.innerHTML += `
                    <div class="msg-row ${type}">
                        <div class="msg-bubble">${safe}</div>
                        <div class="msg-time">${timeStr}</div>
                    </div>`;
            }
            box.scrollTop = box.scrollHeight;
        };

        const exportData = async () => {
            const keys = await new Promise(r => { const req = db.transaction('keys').objectStore('keys').getAll(); req.onsuccess = () => r(req.result); });
            const msgs = await new Promise(r => { const req = db.transaction('messages').objectStore('messages').getAll(); req.onsuccess = () => r(req.result); });
            const contacts = await new Promise(r => { const req = db.transaction('contacts').objectStore('contacts').getAll(); req.onsuccess = () => r(req.result); });
            
            const exportKeys = await Promise.all(keys.map(async k => {
                const priv = await window.crypto.subtle.exportKey("jwk", k.privateKey);
                const pub = await window.crypto.subtle.exportKey("jwk", k.publicKey);
                return { uid: k.uid, nickname: k.nickname, privateKey: priv, publicKey: pub };
            }));

            const blob = new Blob([JSON.stringify({ keys: exportKeys, msgs, contacts })], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `backup_${Date.now()}.json`;
            a.click();
        };

        const importData = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async e => {
                try {
                    const data = JSON.parse(e.target.result);
                    const tx = db.transaction(['keys', 'messages', 'contacts'], 'readwrite');
                    
                    for (const k of data.keys) {
                        const priv = await window.crypto.subtle.importKey("jwk", k.privateKey, { name: "RSA-OAEP", hash: "SHA-256" }, true, ["decrypt"]);
                        const pub = await window.crypto.subtle.importKey("jwk", k.publicKey, { name: "RSA-OAEP", hash: "SHA-256" }, true, ["encrypt"]);
                        tx.objectStore('keys').put({ uid: k.uid, nickname: k.nickname, privateKey: priv, publicKey: pub });
                    }
                    if(data.msgs) data.msgs.forEach(m => { delete m.id; tx.objectStore('messages').add(m); });
                    if(data.contacts) data.contacts.forEach(c => tx.objectStore('contacts').put(c));
                    
                    tx.oncomplete = () => { alert('恢复成功！请刷新页面。'); location.reload(); };
                } catch(err) { alert('恢复失败，请检查备份文件是否正确'); }
            };
            reader.readAsText(file);
        };

        const checkSession = async () => {
            const savedUid = sessionStorage.getItem('chat_uid');
            const savedNick = sessionStorage.getItem('chat_nick');
            const savedToken = sessionStorage.getItem('chat_token');
            if (savedUid && savedToken && savedNick) {
                const priv = await getPrivateKey(savedUid);
                if (priv) {
                    currentUid = savedUid;
                    currentNickname = savedNick;
                    currentToken = savedToken;
                    document.getElementById('auth-view').classList.add('hidden');
                    document.getElementById('main-view').classList.remove('hidden');
                    document.getElementById('my-name').innerText = currentNickname;
                    document.getElementById('my-uid').innerText = `UID: ${currentUid}`;
                    initSocket();
                    renderUserList();
                }
            }
        };

        window.onload = async () => {
            await initDB();
            await checkSession();
        };
    </script>
</body>
</html>
