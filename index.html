<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>隐语</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --text: #e2e8f0; --primary: #3b82f6; --msg-me: #2563eb; --msg-other: #334155; --success: #10b981; --danger: #ef4444; --warning: #f59e0b; --border: #334155; --text-muted: #94a3b8;}
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
        .hidden { display: none !important; }
        input, button { width: 100%; box-sizing: border-box; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border); outline: none; font-size: 15px; transition: all 0.2s; }
        input { background: #0f172a; color: white; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25); }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; border: none; display: flex; justify-content: center; align-items: center; gap: 8px; }
        button:active { transform: scale(0.98); }
        button.secondary { background: #334155; }
        button.danger { background: var(--danger); }
        .container { max-width: 500px; margin: auto; padding: 20px; width: 100%; }
        .panel { background: var(--panel); padding: 30px 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .brand-header { text-align: center; margin-bottom: 25px; }
        .guide-box { background: rgba(59, 130, 246, 0.1); border-radius: 10px; padding: 15px; margin-top: 20px; border: 1px solid rgba(59, 130, 246, 0.2); }
        .guide-box h4 { margin: 0 0 10px 0; font-size: 14px; color: var(--primary); }
        .guide-box ol { margin: 0; padding-left: 20px; color: var(--text-muted); font-size: 12px; line-height: 1.8; }
        .list-item { padding: 15px; background: #334155; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; position: relative; }
        #chat-view, #settings-view { display: flex; flex-direction: column; height: 100%; background: var(--bg); position: fixed; inset: 0; z-index: 10; }
        .header-bar { padding: 15px; background: var(--panel); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; width: 100%; flex-direction: column; }
        .me { align-items: flex-end; }
        .other { align-items: flex-start; }
        .msg-bubble { max-width: 75%; padding: 10px 15px; border-radius: 12px; line-height: 1.5; word-wrap: break-word; }
        .me .msg-bubble { background: var(--msg-me); border-bottom-right-radius: 2px; }
        .other .msg-bubble { background: var(--msg-other); border-bottom-left-radius: 2px; }
        .msg-time { font-size: 10px; color: #64748b; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
        #chat-input-area { padding: 15px; background: var(--panel); display: flex; gap: 8px; align-items: center; }
        #chat-input-area input { margin: 0; }
        .voice-btn { width: 42px !important; height: 42px; border-radius: 50% !important; padding: 0 !important; font-size: 18px; }
        .recording { background: var(--danger) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .audio-player { display: flex; align-items: center; gap: 8px; cursor: pointer; min-width: 100px; }
        .unread-badge { background: var(--danger); color: white; font-size: 11px; padding: 2px 6px; border-radius: 10px; position: absolute; right: 10px; top: 10px; font-weight: bold; }
        #network-bar { background: var(--danger); color: white; text-align: center; padding: 5px; font-size: 12px; position: fixed; width:100%; z-index:100; }
        #webrtc-view { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #remote-video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; top: 20px; right: 20px; width: 100px; height: 150px; border-radius: 10px; object-fit: cover; border: 2px solid #fff; }
        .call-tools { position: absolute; bottom: 50px; display: flex; gap: 30px; }
        .circle-btn { width: 65px; height: 65px; border-radius: 50%; font-size: 24px; }
        .tick-read { color: var(--success); font-weight: bold; }
    </style>
</head>
<body>
    <div id="network-bar" class="hidden">⚠ 连接已断开，正在后台尝试重连...</div>

    <div id="auth-view" class="container">
        <div class="panel">
            <div class="brand-header"><span style="font-size:40px;">🛡️</span><h2>隐语</h2><p>安全 · 私密 · 无痕</p></div>
            <input type="text" id="uid-input" placeholder="8位数字 UID (登录用)" maxlength="8">
            <input type="password" id="password" placeholder="安全密码">
            <button onclick="login()">登 录</button>
            <button class="secondary" onclick="register()">创建新账号</button>
            <div class="guide-box">
                <h4>使用说明：</h4>
                <ol>
                    <li><b>通知权限：</b>登录后请开启通知权限，确保后台能收到实时提醒。 </li>
                    <li><b>注册：</b>点击“创建账号”设置昵称，系统将分配 8 位 UID。</li>
                    <li><b>身份：</b>UID + 密码是唯一凭证，更换设备需手动输入。</li>
                    <li><b>备份：</b>消息仅存本地，更换手机请先点击“导出备份”。</li>
                </ol>
            </div>
            <div class="flex" style="margin-top:20px;"><button class="secondary btn-sm" onclick="exportData()">💾 导出备份</button><button class="secondary btn-sm" onclick="document.getElementById('import-file').click()">📂 导入</button><input type="file" id="import-file" class="hidden" onchange="importData(event)"></div>
        </div>
    </div>

    <div id="main-view" class="container hidden">
        <div class="panel">
            <div class="flex" style="justify-content:space-between; align-items:center;">
                <div><span id="my-name" style="font-weight:bold; font-size:18px;"></span><br><span id="my-uid" style="color:var(--text-muted); font-size:12px;"></span></div>
                <button class="secondary" style="width:auto; padding:8px 12px;" onclick="openSettings()">⚙️</button>
            </div>
            <div class="flex" style="margin:15px 0;"><input type="text" id="add-contact-input" placeholder="输入好友 UID" style="margin:0;"><button class="success" style="width:80px; margin:0;" onclick="addContact()">添加</button></div>
            <div id="user-list" style="max-height:400px; overflow-y:auto;"></div>
        </div>
    </div>

    <div id="chat-view" class="hidden">
        <div class="header-bar">
            <div><strong id="chat-target-name"></strong><br><span id="chat-target-status" style="font-size:11px;"></span></div>
            <div class="flex"><button class="success" style="width:40px; height:40px; border-radius:50%;" onclick="startCall()">📞</button><button class="danger" style="width:auto; padding:5px 10px;" onclick="clearChat()">清空</button><button class="secondary" style="width:auto; padding:5px 15px;" onclick="closeChat()">返回</button></div>
        </div>
        <div id="chat-box" onscroll="handleChatScroll()"></div>
        <div id="chat-input-area">
            <button class="secondary voice-btn" id="voice-btn" onmousedown="startRecording()" onmouseup="stopRecording()" ontouchstart="startRecording()" ontouchend="stopRecording()">🎤</button>
            <button class="secondary" style="width:42px; height:42px; border-radius:50%;" onclick="document.getElementById('file-upload').click()">📎</button>
            <input type="file" id="file-upload" class="hidden" onchange="handleFileUpload(event)">
            <input type="text" id="msg-input" placeholder="输入消息..." onkeypress="if(event.keyCode==13) sendMessage()">
            <button id="send-btn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <div id="settings-view" class="container hidden">
        <div class="panel"><h3>设置</h3><input type="text" id="settings-nickname" placeholder="修改昵称"><button onclick="saveProfile()">保存</button><button class="secondary" onclick="closeSettings()">返回</button></div>
    </div>

    <div id="webrtc-view" class="hidden">
        <h3 id="call-status" style="position:absolute; top:40px; color:#fff; z-index:10;">呼叫中...</h3>
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted></video>
        <div class="call-tools" id="call-tools"><button class="danger circle-btn" onclick="endCall()">☎</button></div>
        <div class="call-tools hidden" id="incoming-tools"><button class="success circle-btn" onclick="acceptCall()">📞</button><button class="danger circle-btn" onclick="endCall()">拒绝</button></div>
    </div>

    <script>
        let db, currentUid, currentNickname, currentToken, currentTargetUid, socket, peerConnection, localStream;
        let onlineUsers = new Set(), unreadMap = {}, chatHistory = [], lastLoadedTs = 0, isEnd = false, mediaRecorder, audioChunks = [];
        const STUN = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

        // 核心优化：后台通知申请
        const requestNotifyPermission = () => {
            if ("Notification" in window && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        };

        const showPushNotification = (fromName, text) => {
            if ("Notification" in window && Notification.permission === "granted" && document.hidden) {
                new Notification(`隐语 - ${fromName}`, { body: text, icon: '🛡️' });
            }
        };

        const initDB = () => new Promise((res) => {
            const req = indexedDB.open('SecureChatDB', 7);
            req.onupgradeneeded = e => {
                const idb = e.target.result;
                if (!idb.objectStoreNames.contains('keys')) idb.createObjectStore('keys', { keyPath: 'uid' });
                if (!idb.objectStoreNames.contains('contacts')) idb.createObjectStore('contacts', { keyPath: 'uid' });
                if (!idb.objectStoreNames.contains('messages')) {
                    const os = idb.createObjectStore('messages', { keyPath: 'id', autoIncrement: true });
                    os.createIndex('contact', 'contact'); os.createIndex('ts', 'ts');
                }
            };
            req.onsuccess = e => { db = e.target.result; res(); };
        });

        const cryptoOp = {
            async gen() { return await window.crypto.subtle.generateKey({ name: "RSA-OAEP", modulusLength: 2048, publicExponent: new Uint8Array([1, 0, 1]), hash: "SHA-256" }, true, ["encrypt", "decrypt"]); },
            async export(k) { return btoa(String.fromCharCode(...new Uint8Array(await window.crypto.subtle.exportKey("spki", k)))); },
            async enc(txt, pubStr) {
                const pub = await window.crypto.subtle.importKey("spki", Uint8Array.from(atob(pubStr), c=>c.charCodeAt(0)).buffer, { name: "RSA-OAEP", hash: "SHA-256" }, true, ["encrypt"]);
                const aes = await window.crypto.subtle.generateKey({ name: "AES-GCM", length: 256 }, true, ["encrypt"]);
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const cipher = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv }, aes, new TextEncoder().encode(txt));
                const k = await window.crypto.subtle.encrypt({ name: "RSA-OAEP" }, pub, await window.crypto.subtle.exportKey("raw", aes));
                return JSON.stringify({ k: btoa(String.fromCharCode(...new Uint8Array(k))), i: btoa(String.fromCharCode(...new Uint8Array(iv))), c: btoa(String.fromCharCode(...new Uint8Array(cipher))) });
            },
            async dec(str, priv) {
                const p = JSON.parse(str);
                const rawK = await window.crypto.subtle.decrypt({ name: "RSA-OAEP" }, priv, Uint8Array.from(atob(p.k), c=>c.charCodeAt(0)).buffer);
                const aes = await window.crypto.subtle.importKey("raw", rawK, "AES-GCM", false, ["decrypt"]);
                return new TextDecoder().decode(await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: Uint8Array.from(atob(p.i), c=>c.charCodeAt(0)) }, aes, Uint8Array.from(atob(p.c), c=>c.charCodeAt(0)).buffer));
            }
        };

        const login = async () => {
            const u = document.getElementById('uid-input').value, p = document.getElementById('password').value;
            const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ uid: u, password: p }) }).then(r=>r.json());
            if(res.error) return alert(res.error);
            const keys = await new Promise(r => { const req = db.transaction('keys').objectStore('keys').get(u); req.onsuccess = () => r(req.result); });
            if(!keys) return alert("本地缺失密钥");
            currentUid = u; currentNickname = res.nickname; currentToken = res.token;
            sessionStorage.setItem('chat_uid', u); sessionStorage.setItem('chat_token', res.token);
            document.getElementById('auth-view').classList.add('hidden'); document.getElementById('main-view').classList.remove('hidden');
            document.getElementById('my-name').innerText = res.nickname; document.getElementById('my-uid').innerText = "UID: " + u;
            requestNotifyPermission(); // 登录后立即申请通知权限
            initSocket(); renderContacts();
        };

        const initSocket = () => {
            socket = io({ transports: ['websocket'], reconnectionAttempts: 20 });
            socket.on('connect', () => { document.getElementById('network-bar').classList.add('hidden'); socket.emit('register_socket', { uid: currentUid, token: currentToken }); });
            socket.on('disconnect', () => document.getElementById('network-bar').classList.remove('hidden'));
            socket.on('online_users', d => { d.users.forEach(u => onlineUsers.add(u)); renderContacts(); });
            socket.on('user_status', d => { d.status === 'online' ? onlineUsers.add(d.uid) : onlineUsers.delete(d.uid); renderContacts(); if(currentTargetUid===d.uid) updateStatusUI(); });
            socket.on('receive_message', async d => processMsg(d));
            socket.on('offline_sync', ds => ds.forEach(d => processMsg(d)));
            socket.on('msg_ack', d => updateTick(d.msgId, 1));
            socket.on('msg_read', d => updateTick(d.msgId, 2));
            socket.on('webrtc_signal', handleSignal);
        };

        const processMsg = async (d) => {
            try {
                const keys = await new Promise(r => { const req = db.transaction('keys').objectStore('keys').get(currentUid); req.onsuccess = () => r(req.result); });
                const plain = await cryptoOp.dec(d.payload, keys.priv);
                const msg = JSON.parse(plain);
                const obj = { contact: d.from, type: 'other', content: msg.c, mType: msg.t, ts: d.timestamp, msgId: msg.id, status: 0 };
                const tx = db.transaction('messages', 'readwrite'); tx.objectStore('messages').add(obj);
                
                // 核心功能：触发手机后台通知
                const contact = await new Promise(r => { const req = db.transaction('contacts').objectStore('contacts').get(d.from); req.onsuccess = () => r(req.result); });
                const preview = msg.t === 'text' ? msg.c : '[媒体消息]';
                showPushNotification(contact ? contact.nick : d.from, preview);

                if(currentTargetUid === d.from) { appendDOM(obj); socket.emit('msg_read', { from: currentUid, token: currentToken, to: d.from, msgId: msg.id }); }
                else { unreadMap[d.from] = (unreadMap[d.from] || 0) + 1; renderContacts(); socket.emit('msg_ack', { from: currentUid, token: currentToken, to: d.from, msgId: msg.id }); }
            } catch(e) {}
        };

        const renderContacts = async () => {
            const list = document.getElementById('user-list'); list.innerHTML = '';
            const contacts = await new Promise(r => { const req = db.transaction('contacts').objectStore('contacts').getAll(); req.onsuccess = () => r(req.result); });
            contacts.forEach(c => {
                const isOnline = onlineUsers.has(c.uid);
                const unread = unreadMap[c.uid] || 0;
                const div = document.createElement('div'); div.className = 'list-item';
                div.innerHTML = `<div><span style="font-weight:bold;">${c.nick}</span> <span style="font-size:11px;color:#94a3b8;">(${c.uid})</span><br><span style="font-size:11px;color:${isOnline?'var(--success)':'var(--danger)'}">${isOnline?'● 在线':'● 离线'}</span></div>${unread?`<div class="unread-badge">${unread}</div>`:''}<button class="secondary" style="width:auto;padding:5px 15px;" onclick="openChat('${c.uid}','${c.nick}','${c.pub}')">对话</button>`;
                list.appendChild(div);
            });
        };

        // 其它业务函数保持不变... (addContact, cryptoOp.gen, sendMessage, startRecording等)
        const register = async () => {
            const p = document.getElementById('password').value; if(!p) return alert('输入密码');
            const nick = prompt("昵称?"); if(!nick) return;
            const keys = await cryptoOp.gen();
            const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nickname: nick, password: p, public_key: await cryptoOp.export(keys.publicKey) }) }).then(r=>r.json());
            if(res.error) return alert(res.error);
            const tx = db.transaction('keys', 'readwrite'); tx.objectStore('keys').put({ uid: res.uid, nick, priv: keys.privateKey, pub: keys.publicKey });
            alert("注册成功！你的 UID: " + res.uid);
        };
        const addContact = async () => {
            const u = document.getElementById('add-contact-input').value; if(!u) return;
            const res = await fetch('/api/contact', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ uid: u }) }).then(r=>r.json());
            if(res.error) return alert(res.error);
            const tx = db.transaction('contacts', 'readwrite'); tx.objectStore('contacts').put({ uid: res.uid, nick: res.nickname, pub: res.public_key });
            renderContacts();
        };
        const openChat = async (uid, name, pub) => {
            currentTargetUid = uid; targetPublicKeyStr = pub; unreadMap[uid] = 0;
            document.getElementById('main-view').classList.add('hidden'); document.getElementById('chat-view').classList.remove('hidden');
            document.getElementById('chat-target-name').innerText = name; updateStatusUI();
            document.getElementById('chat-box').innerHTML = '';
            const tx = db.transaction('messages').objectStore('messages');
            tx.index('contact').getAll(uid).onsuccess = e => e.target.result.sort((a,b)=>a.ts-b.ts).forEach(m=>appendDOM(m));
            renderContacts();
        };
        const closeChat = () => { currentTargetUid = null; document.getElementById('chat-view').classList.add('hidden'); document.getElementById('main-view').classList.remove('hidden'); };
        const appendDOM = (m) => {
            const box = document.getElementById('chat-box'); const row = document.createElement('div'); row.className = `msg-row ${m.type}`;
            let html = m.mType==='text' ? m.content.replace(/[&<>'"]/g, t=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[t])) : (m.mType==='audio'?`<div class="audio-player" onclick="new Audio('${m.content}').play()">🎵 语音 (点击播放)</div>`:`[媒体]`);
            row.innerHTML = `<div class="msg-bubble">${html}</div><div class="msg-time">${new Date(m.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>`;
            box.appendChild(row); box.scrollTop = box.scrollHeight;
        };
        const sendMessage = async (mType = 'text', content = null) => {
            const input = document.getElementById('msg-input'); const val = content || input.value.trim(); if(!val) return;
            if(!content) input.value = ''; const msgId = Math.random().toString(36).substr(2, 9); const ts = Date.now();
            const payload = { id: msgId, t: mType, c: val }; const obj = { contact: currentTargetUid, type: 'me', content: val, mType, ts, msgId, status: 0 };
            const tx = db.transaction('messages', 'readwrite'); tx.objectStore('messages').add(obj); appendDOM(obj);
            const enc = await cryptoOp.enc(JSON.stringify(payload), targetPublicKeyStr);
            socket.emit('send_message', { from: currentUid, token: currentToken, to: currentTargetUid, payload: enc });
        };
        const startRecording = async () => { try { const s = await navigator.mediaDevices.getUserMedia({ audio: true }); mediaRecorder = new MediaRecorder(s); audioChunks = []; mediaRecorder.ondataavailable = e => audioChunks.push(e.data); mediaRecorder.onstop = () => { const b = new Blob(audioChunks, { type: 'audio/webm' }); const r = new FileReader(); r.readAsDataURL(b); r.onloadend = () => sendMessage('audio', r.result); }; mediaRecorder.start(); document.getElementById('voice-btn').classList.add('recording'); } catch(e) { alert("权限拒绝"); } };
        const stopRecording = () => { if(mediaRecorder) { mediaRecorder.stop(); document.getElementById('voice-btn').classList.remove('recording'); } };
        const updateStatusUI = () => document.getElementById('chat-target-status').innerText = onlineUsers.has(currentTargetUid)?"在线":"离线";
        const clearChat = () => { if(confirm("清空记录？")) { const tx = db.transaction('messages', 'readwrite'); tx.objectStore('messages').index('contact').openKeyCursor(IDBKeyRange.only(currentTargetUid)).onsuccess = e => { const c = e.target.result; if(c){ tx.objectStore('messages').delete(c.primaryKey); c.continue(); } else { document.getElementById('chat-box').innerHTML = ''; } }; } };

        window.onload = async () => { await initDB(); };
    </script>
</body>
</html>
